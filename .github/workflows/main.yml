name: Build APK
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        # استبدل YourFolderName باسم المجلد الموجود داخل جيت هاب
        run: flutter pub get
        working-directory: ./YourFolderName 

      - name: Build APK
        run: flutter build apk --debug
        working-directory: ./YourFolderName
