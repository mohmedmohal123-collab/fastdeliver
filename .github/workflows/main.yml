name: Build APK
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # تم تعديل هذا السطر ليبحث عن ملف pubspec.yaml في أي مكان داخل المستودع
      - name: Get dependencies
        run: |
          cd $(find . -name pubspec.yaml -exec dirname {} \;)
          flutter pub get

      # تم تعديل هذا السطر ليبحث عن المجلد ويبني التطبيق بداخله تلقائياً
      - name: Build APK
        run: |
          PROJECT_PATH=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_PATH
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fastdeliver-apk
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
